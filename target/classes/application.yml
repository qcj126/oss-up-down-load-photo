spring:
  application:
    name: oss-up-down-load-photo
  data:
    redis:
      password: your
      host: your
      port: 6379
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://your:3306/canal-demo?useSSL=false&serverTimezone=UTC
    username: your
    password: your
  rabbitmq:
    host: your
    port: 5672
    username: your
    password: your
    listener:
      simple:
        prefetch: 1 # ???????????
        acknowledge-mode: manual        # ??????
        retry:
          enabled: true                 # ?????????
          max-attempts: 3               # ????3?
          initial-interval: 1000ms      # ??????1?
          multiplier: 2                 # ????????
          max-interval: 10000ms         # ??????10?

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
aliyun:
  oss:
    endpoint: your               # ??OSS Endpoint
    access-key-id: your             # ??AccessKey ID
    access-key-secret: your   # ??AccessKey Secret
    bucket-name: your                                 # ??Bucket??
    region: your
mybatis:
  mapper-locations: mapper/*.xml

server:
  port: 9999